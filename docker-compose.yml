# THE MASTER FILE: Glues everything together
services:
  app:
    build: ./target_app
    expose:
      - "5000"  
    mem_limit: 300m    # Hard limit: Only gets 10% of a single CPU core! Hard limit: Maxes out at exactly 128 Megabytes of RAM

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml

  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  sentinel_api:
    build: 
      context: ./src
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1   # <--- Forces real-time printing
    volumes:
      - ./src:/app
      # 1. Give the API the keys to your laptop's Docker engine
      - /var/run/docker.sock:/var/run/docker.sock
      # 2. Give it access to the compose file so it can run the scale command
      - ./:/project_root
      # 3. Give it access to rewrite the load balancer configuration
      - ./infra/nginx:/etc/nginx_shared