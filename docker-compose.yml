# THE MASTER FILE: Glues everything together
1.  version: '3.8'
2.  
3.  services:
4.    app:
5.      build: ./target_app
6.      expose:
7.        - "5000"
8.      
9.    nginx:
10.     image: nginx:alpine
11.     ports:
12.       - "80:80"
13.     volumes:
14.       - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
15.     depends_on:
16.       - app
17. 
18.   prometheus:
19.     image: prom/prometheus
20.     ports:
21.       - "9090:9090"
22.     volumes:
23.       - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
24.       - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
25. 
26.   alertmanager:
27.     image: prom/alertmanager
28.     ports:
29.       - "9093:9093"
30.     volumes:
31.       - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml