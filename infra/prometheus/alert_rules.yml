groups:
  - name: production_alerts
    rules:
      
      # 1. SATURATION: CPU SPIKE
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[1m]) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container CPU has been above 80% for 2 minutes. Possible traffic surge."

      # 2. SATURATION: MEMORY LEAK
      - alert: HighMemoryUsage
        # process_resident_memory_bytes gives bytes. Divide by 1024 twice to get MB.
        expr: process_resident_memory_bytes / 1024 / 1024 > 150
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container Memory exceeded 150MB. Possible memory leak detected."

      # 3. ERRORS: HIGH HTTP 500 RATE
      - alert: HighErrorRate
        # Calculates: (500 errors per min) / (Total requests per min) * 100
        expr: sum(rate(flask_http_request_duration_seconds_count{status=~"5.."}[1m])) / sum(rate(flask_http_request_duration_seconds_count[1m])) * 100 > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "More than 5% of requests are failing with 5xx Server Errors."